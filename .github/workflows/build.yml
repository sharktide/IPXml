name: Build & Package (Nightly)

on:
  push:

env:
  APP_NAME: ipxml
  BINARIES: "ipxml ipxml-cc"
  DEVELOPER_ID_APP_CERT: ${{ secrets.DEVELOPER_APP_CERT }}
  DEVELOPER_ID_INSTALLER_CERT: ${{ secrets.INSTALLER_CERT }}
  DEVELOPER_ID_APP: "Developer ID Application: Navita Meher (5WY7FLX467)"
  DEVELOPER_ID_INSTALLER: "Developer ID Installer: Navita Meher (5WY7FLX467)"
  CERT_PASSWORD: ${{ secrets.DEVELOPER_APP_CERT_KEY }}
  APPLE_ID: chintanjain@gmail.com
  APPLE_TEAM_ID: 5WY7FLX467
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

jobs:

  windows:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Version + SHA
        shell: pwsh
        run: |
          $version = & .\installer\version.ps1 get
          $sha = "${{ github.sha }}".Substring(0,7)
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "SHORT_SHA=$sha" >> $env:GITHUB_ENV

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10'
    
      - name: Install WiX
        run: dotnet tool install --global WiX
      
      - name: Accept WiX
        run: wix eula accept wix7

      - name: Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build MSI
        run: |
          wix build installer/windows.wxs \
            -o ipxml-win-${{ matrix.arch }}-${{ env.VERSION }}-${{ env.SHORT_SHA }}.msi

      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ipxml-win-${{ matrix.arch }}-${{ env.VERSION }}-${{ env.SHORT_SHA }}.msi

  linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Version + SHA
        run: |
          sudo chmod +x installer/version.sh
          VERSION=$(./installer/version.sh get)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential gcc-aarch64-linux-gnu
      
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install fpm
        run: sudo gem install fpm

      - name: Prepare package root
        run: |
          mkdir -p pkgroot/opt/ipxml/bin
          cp target/${{ matrix.target }}/release/ipxml pkgroot/opt/ipxml/bin/
          cp target/${{ matrix.target }}/release/ipxml-cc pkgroot/opt/ipxml/bin/

      - name: Create postinstall
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/postinstall.sh
          #!/bin/bash
          ln -sf /opt/ipxml/bin/ipxml /usr/local/bin/ipxml
          ln -sf /opt/ipxml/bin/ipxml-cc /usr/local/bin/ipxml-cc
          EOF
          chmod +x scripts/postinstall.sh

      - name: Build deb
        run: |
          OUTPUT=ipxml-linux-${{ matrix.arch }}-${VERSION}-${SHORT_SHA}.deb

          fpm -s dir -t deb \
            -n ipxml \
            -v $VERSION \
            --architecture ${{ matrix.arch }} \
            --prefix / \
            --after-install scripts/postinstall.sh \
            -p $OUTPUT \
            pkgroot/=/

      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ipxml-linux-${{ matrix.arch }}-${{ env.VERSION }}-${{ env.SHORT_SHA }}.deb

  macos:
    runs-on: macos-latest

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Version + SHA
        run: |
          sudo chmod +x installer/version.sh
          VERSION=$(./installer/version.sh get)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare root
        run: |
          mkdir -p pkgroot/usr/local/bin
          cp target/${{ matrix.target }}/release/ipxml pkgroot/usr/local/bin/
          cp target/${{ matrix.target }}/release/ipxml-cc pkgroot/usr/local/bin/

      - name: Import certs
        run: |
          echo "$DEVELOPER_ID_APP_CERT" | base64 --decode > app.p12
          echo "$DEVELOPER_ID_INSTALLER_CERT" | base64 --decode > installer.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import app.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security import installer.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/productsign \
            -T /usr/bin/security

          security set-key-partition-list \
           -S apple-tool:,apple: \
           -s -k "" build.keychain

      - name: Codesign
        run: |
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml-cc

      - name: Build pkg
        run: |
          pkgbuild \
            --root pkgroot \
            --identifier com.ipxml.pkg \
            --version $VERSION \
            --install-location / \
            ipxml-mac-${{ matrix.arch }}-${VERSION}-${SHORT_SHA}.pkg

      - name: Sign
        run: |
          productsign \
            --sign "$DEVELOPER_ID_INSTALLER" \
            ipxml-mac-${{ matrix.arch }}-${VERSION}-${SHORT_SHA}.pkg \
            signed.pkg

      - name: Notarize
        run: |
          xcrun notarytool submit signed.pkg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        run: xcrun stapler staple signed.pkg

      - name: Rename final
        run: |
          mv signed.pkg ipxml-mac-${{ matrix.arch }}-${VERSION}-${SHORT_SHA}.pkg

      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ipxml-mac-${{ matrix.arch }}-${{ env.VERSION }}-${{ env.SHORT_SHA }}.pkg