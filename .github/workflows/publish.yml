name: Build & Package (Native Installers)

on:
  push:
    branches: [ main ]
  pull_request:

env:
  APP_NAME: ipxml
  BINARIES: "ipxml ipxml-cc"
  DEVELOPER_ID_APP_CERT: ${{ secrets.DEVELOPER_APP_CERT }}
  DEVELOPER_ID_INSTALLER_CERT: ${{ secrets.INSTALLER_CERT }}
  DEVELOPER_ID_APP: "Developer ID Application: Navita Meher (5WY7FLX467)"
  DEVELOPER_ID_INSTALLER: "Developer ID Installer: Navita Meher (5WY7FLX467)"
  CERT_PASSWORD: ${{ secrets.DEVELOPER_APP_CERT_KEY }}
  APPLE_ID: chintanjain@gmail.com
  APPLE_TEAM_ID: 5WY7FLX467
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}

jobs:

# ---------------- WINDOWS ----------------

  windows:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: aarch64-pc-windows-msvc
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        shell: pwsh
        run: |
          $version = & .\installer\version.ps1 get
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10'

      - name: Install WiX
        run: dotnet tool install --global WiX

      - name: Accept WiX
        run: wix eula accept wix7

      - name: Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build MSI
        run: |
          wix build installer/windows.wxs \
            -o ipxml-windows-${{ matrix.arch }}-${{ env.VERSION }}.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi-${{ matrix.arch }}
          path: ipxml-windows-${{ matrix.arch }}-${{ env.VERSION }}.msi

      - name: Zip binaries
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          zip ipxml-windows-${{ matrix.arch }}.zip ipxml.exe ipxml-cc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/ipxml-windows-${{ matrix.arch }}.zip


# ---------------- LINUX ----------------

  linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: CHMOD Scripts
        run: sudo chmod +x installer/version.sh

      - name: Read version
        run: echo "VERSION=$(./installer/version.sh get)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential gcc-aarch64-linux-gnu
      
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install fpm
        run: sudo gem install fpm

      - name: Package
        run: |
          mkdir -p pkgroot/opt/ipxml/bin
          cp target/${{ matrix.target }}/release/ipxml pkgroot/opt/ipxml/bin/
          cp target/${{ matrix.target }}/release/ipxml-cc pkgroot/opt/ipxml/bin/

          fpm -s dir -t deb \
            -n ipxml \
            -v $VERSION \
            --architecture ${{ matrix.arch }} \
            pkgroot/=/

      - name: Rename deb
        run: |
          mv *.deb ipxml-linux-${{ matrix.arch }}-${VERSION}.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ matrix.arch }}
          path: ipxml-linux-${{ matrix.arch }}-${{ env.VERSION }}.deb

      - name: Zip binaries
        run: |
          cd target/${{ matrix.target }}/release
          zip ipxml-linux-${{ matrix.arch }}.zip ipxml ipxml-cc

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/ipxml-linux-${{ matrix.arch }}.zip


# ---------------- MACOS ----------------

  macos:
    runs-on: macos-latest

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: CHMOD Scripts
        run: sudo chmod +x installer/version.sh

      - name: Read version
        run: echo "VERSION=$(./installer/version.sh get)" >> $GITHUB_ENV

      - name: Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare pkg root
        run: |
          mkdir -p pkgroot/usr/local/bin
          cp target/${{ matrix.target }}/release/ipxml pkgroot/usr/local/bin/
          cp target/${{ matrix.target }}/release/ipxml-cc pkgroot/usr/local/bin/

      # (cert import unchanged)
      - name: Import certificates
        run: |
          echo "$DEVELOPER_ID_APP_CERT" | base64 --decode > app.p12
          echo "$DEVELOPER_ID_INSTALLER_CERT" | base64 --decode > installer.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import app.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security import installer.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/productsign

      - name: Codesign
        run: |
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml-cc

      - name: Build pkg
        run: |
          pkgbuild \
            --root pkgroot \
            --identifier com.ipxml.pkg \
            --version $VERSION \
            --install-location / \
            ipxml-macos-${{ matrix.arch }}-${VERSION}.pkg

      - name: Sign pkg
        run: |
          productsign \
            --sign "$DEVELOPER_ID_INSTALLER" \
            ipxml-macos-${{ matrix.arch }}-${VERSION}.pkg \
            signed.pkg

      - name: Staple
        run: xcrun stapler staple signed.pkg

      - name: Rename
        run: |
          mv signed.pkg ipxml-macos-${{ matrix.arch }}-${VERSION}.pkg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg-${{ matrix.arch }}
          path: ipxml-macos-${{ matrix.arch }}-${{ env.VERSION }}.pkg

      - name: Zip binaries
        run: |
          cd target/${{ matrix.target }}/release
          zip ipxml-macos-${{ matrix.arch }}.zip ipxml ipxml-cc

      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/ipxml-macos-${{ matrix.arch }}.zip


# ---------------- RELEASE ----------------

  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: CHMOD Scripts
        run: sudo chmod +x installer/version.sh

      - name: Read version
        run: echo "VERSION=$(./installer/version.sh get)" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Debug
        run: ls -R dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            dist/**/*.msi
            dist/**/*.deb
            dist/**/*.pkg
            dist/**/*.zip