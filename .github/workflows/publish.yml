name: Build & Package (Native Installers)

on:
  push:
    branches: [ main ]
  pull_request:

env:
  APP_NAME: ipxml
  BINARIES: "ipxml ipxml-cc"
  DEVELOPER_ID_APP_CERT: ${{ secrets.DEVELOPER_APP_CERT }}
  DEVELOPER_ID_INSTALLER_CERT: ${{ secrets.INSTALLER_CERT }}
  DEVELOPER_ID_APP: "Developer ID Application: Navita Meher (5WY7FLX467)"
  DEVELOPER_ID_INSTALLER: "Developer ID Installer: Navita Meher (5WY7FLX467)"
  CERT_PASSWORD: ${{ secrets.DEVELOPER_APP_CERT_KEY }}
  APPLE_ID: chintanjain@gmail.com
  APPLE_TEAM_ID: 5WY7FLX467
  APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
jobs:

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = & .\installer\version.ps1 get
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
      
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10'
    
      - name: Install WiX Toolset
        run: dotnet tool install --global WiX
      
      - name: Accept WiX EULA
        run: wix eula accept wix7
      
      - name: Build
        run: cargo build --release

      - name: Prepare files
        shell: bash
        run: |
          mkdir -p dist/win
          cp target/release/*.exe dist/win/

      - name: Build MSI
        run: |
          wix build installer/windows.wxs -o ipxml.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ipxml.msi

      - name: Zip binaries
        shell: bash
        run: |
          cd target/release
          zip ipxml-windows.zip ipxml.exe ipxml-cc.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/release/ipxml-windows.zip

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Install fpm
        run: sudo gem install fpm

      - name: Prepare package root
        run: |
          mkdir -p pkgroot/opt/ipxml/bin
          cp target/release/ipxml pkgroot/opt/ipxml/bin/
          cp target/release/ipxml-cc pkgroot/opt/ipxml/bin/

      - name: Create postinstall script
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/postinstall.sh
          #!/bin/bash
          ln -sf /opt/ipxml/bin/ipxml /usr/local/bin/ipxml
          ln -sf /opt/ipxml/bin/ipxml-cc /usr/local/bin/ipxml-cc
          EOF
          chmod +x scripts/postinstall.sh

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            -n ipxml \
            -v $VERSION \
            --prefix / \
            --after-install scripts/postinstall.sh \
            pkgroot/=/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"

      - name: Zip binaries
        run: |
          cd target/release
          zip ipxml-linux.zip ipxml ipxml-cc

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/ipxml-linux.zip

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Prepare pkg root
        run: |
          mkdir -p pkgroot/usr/local/bin
          cp target/release/ipxml pkgroot/usr/local/bin/
          cp target/release/ipxml-cc pkgroot/usr/local/bin/

      - name: Import certificates
        run: |
          echo "$DEVELOPER_ID_APP_CERT" | base64 --decode > app.p12
          echo "$DEVELOPER_ID_INSTALLER_CERT" | base64 --decode > installer.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import app.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security import installer.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/productsign \
            -T /usr/bin/security

          security set-key-partition-list \
           -S apple-tool:,apple: \
           -s -k "" build.keychain

      - name: Codesign binaries
        run: |
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml
          codesign --sign "$DEVELOPER_ID_APP" --timestamp --options runtime pkgroot/usr/local/bin/ipxml-cc

      - name: Build pkg
        run: |
          pkgbuild \
            --root pkgroot \
            --identifier com.ipxml.pkg \
            --version $VERSION \
            --install-location / \
            ipxml.pkg

      - name: Sign pkg
        run: |
          productsign \
            --sign "$DEVELOPER_ID_INSTALLER" \
            ipxml.pkg ipxml-signed.pkg

      - name: Notarize
        run: |
          xcrun notarytool submit ipxml-signed.pkg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        run: xcrun stapler staple ipxml-signed.pkg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ipxml-signed.pkg

      - name: Zip binaries
        run: |
          cd target/release
          zip ipxml-macos.zip ipxml ipxml-cc

      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: |
            target/release/ipxml-macos.zip

  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          echo "VERSION=$(./installer/version.sh get)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files (debug)
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            dist/**/*.msi
            dist/**/*.deb
            dist/**/*.pkg
            dist/**/*.zip