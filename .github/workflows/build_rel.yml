# GitHub Actions workflow to build a Rust cargo project in release mode
# and create installers for the three binaries: ipxml, ipxml‑cc, and ipxml‑runtime.
# Installers are generated for Windows, Linux, and macOS with platform‑specific formats.
name: Build & Package Cargo Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    env:
      # Set Rust toolchain version
      RUST_TOOLCHAIN: stable
      # Binaries to package
      BINARIES: ipxml ipxml-cc ipxml-runtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build in release mode
        run: cargo build --release --all-features

      - name: Create installers (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          # Install installer tools
          cargo install cargo-wix
          cargo install cargo-inno
          # Build the MSI installer using cargo-wix
          cargo wix --no-build --source target/release
          # Build an EXE installer using Inno Setup
          cargo inno --source target/release
          # Zip the binaries for unpackaged use
          mkdir -p dist/windows
          for bin in $BINARIES; do
            cp target/release/$bin.exe dist/windows/
          done
          cd dist/windows && zip -r ../ipxml_windows_unpacked.zip *

      - name: Create installers (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          # Install packaging tools
          cargo install cargo-deb
          cargo install cargo-appimage
          # Debian package
          cargo deb --no-build --source target/release
          # AppImage
          cargo appimage --no-build --source target/release
          # Tar.gz for unpackaged use
          mkdir -p dist/linux
          for bin in $BINARIES; do
            cp target/release/$bin dist/linux/
          done
          cd dist/linux && tar -czf ../ipxml_linux_unpacked.tar.gz *

      - name: Create installers (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        run: |
          # Install packaging tools
          cargo install cargo-bundle
          cargo install apple-codesign
          # Bundle each crate
          cd crates/ipxml-cc
          cargo bundle --release
          cd ../ipxml-runtime
          cargo bundle --release --bin ipxml
          cargo bundle --release --bin ipxml-runtime
          cd ../..
          # Import certificates for codesigning
          echo "$DEVELOPER_APP_CERT" | base64 --decode > developer_app_cert.p12
          echo "$INSTALLER_CERT" | base64 --decode > installer_cert.p12
          security create-keychain -p "$DEVELOPER_APP_CERT_KEY" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$DEVELOPER_APP_CERT_KEY" build.keychain
          security import developer_app_cert.p12 -k build.keychain -P "$DEVELOPER_APP_CERT_KEY" -T /usr/bin/codesign
          security import installer_cert.p12 -k build.keychain -P "$INSTALLER_CERT_KEY" -T /usr/bin/codesign
          # Sign the app bundles
          rcodesign sign --keychain build.keychain crates/ipxml-cc/target/release/bundle/osx/IPXml\ Compiler.app
          rcodesign sign --keychain build.keychain crates/ipxml-runtime/target/release/bundle/osx/IPXml\ Runtime.app
          # Create DMG
          brew install create-dmg
          mkdir -p dist/macos
          cp -r crates/ipxml-cc/target/release/bundle/osx/IPXml\ Compiler.app dist/macos/
          cp -r crates/ipxml-runtime/target/release/bundle/osx/IPXml\ Runtime.app dist/macos/
          cd dist/macos
          create-dmg --volname "IPXml" --window-pos 200 120 --window-size 800 400 --icon-size 100 --app-drop-link 600 185 "IPXml.dmg" .
          cd ../..
          # Sign DMG
          rcodesign sign --keychain build.keychain dist/macos/IPXml.dmg
          # Zip for unpackaged use
          mkdir -p dist/macos
          for bin in $BINARIES; do
            cp target/release/$bin dist/macos/
          done
          cd dist/macos && zip -r ../ipxml_macos_unpacked.zip *
        env:
          DEVELOPER_APP_CERT: ${{ secrets.DEVELOPER_APP_CERT }}
          DEVELOPER_APP_CERT_KEY: ${{ secrets.DEVELOPER_APP_CERT_KEY }}
          INSTALLER_CERT: ${{ secrets.INSTALLER_CERT }}
          INSTALLER_CERT_KEY: ${{ secrets.INSTALLER_CERT_KEY }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binaries
          path: |
            target/*.msi
            target/*.exe
            dist/*.zip
            dist/*.tar.gz
            dist/*.appimage
            dist/*.deb
            crates/*/target/release/bundle/osx/*.app
            dist/macos/*.dmg
